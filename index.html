<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialNet Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase JS client via CDN (must load before app.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Social Network Profile Manager</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid py-4">
        <div class="row g-3">
            
            <!-- LEFT PANEL: Profile Management -->
            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title text-primary fw-bold border-bottom pb-2 mb-3">Profile Management</h5>
                        
                        <!-- Add Profile Section -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Add New Profile</label>
                            <div class="input-group">
                                <input type="text" id="newProfileName" class="form-control" placeholder="Enter name">
                                <button class="btn btn-primary" id="addProfileBtn">Add Profile</button>
                            </div>
                        </div>

                        <!-- Search Profile Section -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Search Profile</label>
                            <div class="input-group">
                                <input type="text" id="searchProfileName" class="form-control" placeholder="Search by name">
                                <button class="btn btn-outline-primary" id="searchProfileBtn">Look Up</button>
                            </div>
                        </div>

                        <!-- Delete Profile Button -->
                        <div class="mb-3">
                            <button class="btn btn-danger w-100" id="deleteProfileBtn">Delete Selected Profile</button>
                        </div>

                        <!-- Profile List -->
                        <div class="mb-2">
                            <label class="form-label fw-semibold small text-muted">All Profiles</label>
                        </div>
                        <div class="profile-list-container">
                            <ul class="list-group list-group-flush" id="profileList">
                                <li class="list-group-item text-center text-muted fst-italic small">Loading profiles...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CENTER PANEL: Profile Information -->
            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title text-primary fw-bold border-bottom pb-2 mb-3">Profile Information</h5>
                        
                        <div id="profileInfoContent">
                            <!-- Profile Picture -->
                            <div class="mb-3">
                                <img id="profilePicture" src="images/default.jpg" alt="Profile Picture" 
                                     class="img-fluid rounded-circle border border-primary border-3 profile-picture">
                            </div>

                            <!-- Profile Name -->
                            <h5 id="profileName" class="fw-bold mb-2">Select a profile</h5>

                            <!-- Current Status Badge -->
                            <div class="mb-3">
                                <span id="profileStatus" class="badge bg-primary">No status</span>
                            </div>

                            <!-- Favorite Quote -->
                            <blockquote class="blockquote fst-italic mb-3">
                                <p id="profileQuote" class="small text-muted">No quote available</p>
                            </blockquote>

                            <!-- Friends List -->
                            <div class="text-start">
                                <label class="form-label fw-semibold small text-muted">Friends</label>
                                <ul class="list-group list-group-flush" id="friendsList">
                                    <li class="list-group-item text-center text-muted fst-italic small">No friends to display</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: Edit Profile -->
            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title text-primary fw-bold border-bottom pb-2 mb-3">Edit Profile</h5>
                        
                        <!-- Change Status Section -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Change Status</label>
                            <div class="input-group">
                                <input type="text" id="newStatus" class="form-control" placeholder="Enter new status">
                                <button class="btn btn-primary" id="changeStatusBtn">Update</button>
                            </div>
                        </div>

                        <!-- Change Picture Section -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Change Picture</label>
                            <div class="input-group">
                                <input type="text" id="newPicture" class="form-control" placeholder="images/filename.jpg">
                                <button class="btn btn-secondary" id="changePictureBtn">Update</button>
                            </div>
                            <small class="form-text text-muted">Enter relative path (e.g., images/alice.jpg)</small>
                        </div>

                        <!-- Add Friend Section -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Add Friend</label>
                            <div class="input-group">
                                <input type="text" id="addFriendName" class="form-control" placeholder="Friend's name">
                                <button class="btn btn-success" id="addFriendBtn">Add</button>
                            </div>
                        </div>

                        <!-- Remove Friend Section -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Remove Friend</label>
                            <div class="input-group">
                                <input type="text" id="removeFriendName" class="form-control" placeholder="Friend's name">
                                <button class="btn btn-warning" id="removeFriendBtn">Remove</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar (Footer) -->
    <footer class="status-bar">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <small id="statusMessage">Ready. Select or add a profile to begin.</small>
            </div>
        </div>
    </footer>
    <!-- Bootstrap JS bundle via CDN (Popper.js included) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-
FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Application logic (must come AFTER Bootstrap JS and Supabase CDN) -->
    <script src="js/app.js"></script>
</body>

</html>
