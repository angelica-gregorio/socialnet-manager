<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBYCPG3 SocialNet App - Profile Manager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <!-- ── Header ── -->
    <header id="app-header">
        <h1 id="app-title">LBYCPG3 SocialNet App - Profile Manager</h1>
    </header>

    <!-- ── App Wrapper ── -->
    <div id="app-wrapper">

        <!-- ── Three-panel grid ── -->
        <div id="app-main">

            <!-- LEFT: Profile Management -->
            <div class="sn-panel">
                <div class="panel-header">
                    <p class="panel-title">Profile Management</p>
                </div>
                <div class="panel-body">

                    <label class="field-label" for="input-name">Add/Lookup Profile:</label>
                    <div class="add-lookup-row">
                        <input type="text" id="input-name" class="sn-input" placeholder="Enter profile name">
                        <button id="btn-add" class="sn-btn sn-btn-primary">Add</button>
                    </div>
                    <div class="add-lookup-row">
                        <input type="text" id="input-lookup" class="sn-input" placeholder="Search name">
                        <button id="btn-lookup" class="sn-btn sn-btn-secondary">Lookup</button>
                        <button id="btn-delete" class="sn-btn sn-btn-danger">Delete</button>
                    </div>

                    <span class="profiles-label">All Profiles:</span>
                    <div id="profile-list"></div>

                </div>
            </div>

            <!-- CENTRE: Profile Information -->
            <div class="sn-panel" id="centre-panel">
                <div class="panel-header">
                    <p class="panel-title">Profile Information</p>
                </div>
                <div class="panel-body">

                    <div id="profile-pic-wrap">
                        <img id="profile-pic" src="resources/images/default.png" alt="Profile picture">
                    </div>

                    <h4 id="profile-name">No Profile Selected</h4>

                    <div class="info-block">
                        <p class="info-label">Current Status:</p>
                        <div id="profile-status" class="info-value">—</div>
                    </div>

                    <div class="info-block">
                        <p class="info-label">Favorite Quote:</p>
                        <div id="profile-quote" class="info-value">—</div>
                    </div>

                    <div class="info-block info-block--friends">
                        <p class="info-label">Friends:</p>
                        <div id="friends-list" class="info-value"></div>
                    </div>

                </div>
            </div>

            <!-- RIGHT: Edit Profile -->
            <div class="sn-panel right-panel">
                <div class="panel-header">
                    <p class="panel-title">Edit Profile</p>
                </div>
                <div class="panel-body">

                    <div class="edit-section">
                        <label class="field-label" for="input-status">Change Status:</label>
                        <input type="text" id="input-status" class="sn-input" placeholder="Enter new status">
                        <button id="btn-status" class="sn-btn sn-btn-primary sn-btn-full">Update Status</button>
                    </div>

                    <div class="edit-section">
                        <label class="field-label" for="input-quote">Change Favorite Quote:</label>
                        <input type="text" id="input-quote" class="sn-input" placeholder="Enter favorite quote">
                        <button id="btn-quote" class="sn-btn sn-btn-primary sn-btn-full">Update Quote</button>
                    </div>

                    <div class="edit-section">
                        <label class="field-label" for="input-picture">Change Picture:</label>
                        <input type="text" id="input-picture" class="sn-input" placeholder="Enter image filename">
                        <button id="btn-picture" class="sn-btn sn-btn-primary sn-btn-full">Update Picture</button>
                    </div>

                    <div class="edit-section">
                        <label class="field-label" for="input-friend">Manage Friends:</label>
                        <div class="friends-manage-row">
                            <div>
                                <input type="text" id="input-friend" class="sn-input" placeholder="Friend's name to add">
                                <button id="btn-add-friend" class="sn-btn sn-btn-success sn-btn-full mt-1">Add Friend</button>
                            </div>
                            <div>
                                <input type="text" id="input-remove-friend" class="sn-input" placeholder="Friend's name to remove">
                                <button id="btn-remove-friend" class="sn-btn sn-btn-warning sn-btn-full mt-1">Remove</button>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="right-panel-footer">
                    <button id="btn-exit" class="sn-btn sn-btn-exit sn-btn-full">Exit</button>
                </div>
            </div>

        </div><!-- /#app-main -->

        <!-- ── Status bar ── -->
        <footer id="status-bar">
            <span id="status-message">Ready. Select a profile from the list or add a new one.</span>
        </footer>

    </div><!-- /#app-wrapper -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
